<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            background-color: grey;
            width: 500px;
            height: 500px;
            margin: 0 auto;
            position: relative;
            border-radius: 40px ;
        }

        div::after{
            content: '';
            width: 100%;
            height: 100%;
            position: absolute;
            background-color: red;
            padding: 20px;
            border-radius: 100px ;
        }
    </style>
</head>
<body>
    <div>

    </div>
</body>
</html>
